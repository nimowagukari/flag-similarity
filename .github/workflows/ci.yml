name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: |
          if find . -name '*.py' -not -path './.git/*' | grep -q .; then
            uv run ruff check .
          else
            echo "no Python files yet, skipping lint"
          fi

      - name: Test (pytest)
        run: |
          if [ -d tests ]; then
            uv run python -m pytest
          else
            echo "no tests directory yet, skipping tests"
          fi
